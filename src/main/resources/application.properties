spring.application.name=backend

# MongoDB
# connectTimeoutMS/serverSelectionTimeoutMS make the app fail fast in dev
# when Mongo is not running instead of hanging ~30s on each request.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/workflow_engine?connectTimeoutMS=3000&serverSelectionTimeoutMS=3000}
spring.data.mongodb.auto-index-creation=true

# Server
server.port=${SERVER_PORT:8080}

# Logging
logging.level.org.springframework.data.mongodb=INFO

# JWT
# Base64-encoded HS256 secret (min 32 bytes / 256 bits after decoding).
# Override in production via the JWT_SECRET environment variable.
security.jwt.secret=${JWT_SECRET:ZGV2LXdvcmtmbG93LWVuZ2luZS1zZWNyZXQta2V5LWNoYW5nZS1tZS1pbi1wcm9k}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.jwt.issuer=${JWT_ISSUER:workflow-engine}

# Bootstrap admin (created on first run if it does not exist)
security.bootstrap.admin.email=${ADMIN_EMAIL:admin@workflow.local}
security.bootstrap.admin.password=${ADMIN_PASSWORD:Admin12345!}
security.bootstrap.admin.name=${ADMIN_NAME:System Administrator}

# Gestion Documental (expediente digital)
# Filesystem root where document binaries are stored; Mongo keeps metadata
# + the relative path only (collection "documentos").
app.documents.storage-path=${DOCUMENTS_STORAGE_PATH:./storage/documents}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:25MB}

# OnlyOffice Document Server (editor empresarial .docx/.xlsx/.pptx)
#  - url: donde el NAVEGADOR carga el editor (api.js).
#  - internal-base-url: como el CONTENEDOR del Document Server alcanza a
#    este backend para descargar documentos y notificar guardados
#    (host.docker.internal = tu maquina vista desde Docker Desktop).
#  - secret: JWT PROPIO de OnlyOffice (mismo valor que JWT_SECRET del
#    docker-compose). NUNCA reutilizar security.jwt.secret de usuarios.
app.onlyoffice.url=${ONLYOFFICE_URL:http://localhost:8083}
app.onlyoffice.internal-base-url=${ONLYOFFICE_INTERNAL_BASE_URL:http://host.docker.internal:8080}
app.onlyoffice.secret=${ONLYOFFICE_JWT_SECRET:cambia-este-secreto-onlyoffice-min-32-chars!}

# Firebase Cloud Messaging (push a la app movil del cliente)
# Clave de cuenta de servicio: Firebase Console -> Configuracion del
# proyecto -> Cuentas de servicio -> Generar nueva clave privada.
# Si el archivo no existe, FCM queda deshabilitado (las notificaciones
# igual se guardan en Mongo y se ven en la campanita de la app).
app.fcm.service-account-file=${FCM_SERVICE_ACCOUNT_FILE:./config/firebase-service-account.json}
